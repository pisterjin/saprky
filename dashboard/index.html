<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SPARKY 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: #e2e2f0; min-height: 100vh; }

    header {
      background: linear-gradient(135deg, #3727AB, #5D4CD6);
      padding: 20px 32px;
      display: flex; align-items: center; justify-content: space-between;
    }
    header h1 { font-size: 24px; font-weight: 900; letter-spacing: 2px; color: #fff; }
    header .meta { font-size: 13px; color: rgba(255,255,255,0.7); }
    #last-updated { font-size: 12px; color: rgba(255,255,255,0.55); margin-top: 4px; }

    .container { max-width: 1280px; margin: 0 auto; padding: 28px 24px; }

    /* KPI 카드 */
    .kpi-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px;
      margin-bottom: 28px;
    }
    .kpi-card {
      background: #1c1c2e; border-radius: 14px; padding: 20px;
      border: 1px solid #2a2a40;
    }
    .kpi-card .label { font-size: 12px; color: #9999bb; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    .kpi-card .value { font-size: 32px; font-weight: 700; color: #a78bfa; }
    .kpi-card .sub   { font-size: 12px; color: #666688; margin-top: 4px; }

    /* 차트 그리드 */
    .chart-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 28px;
    }
    .chart-grid.three { grid-template-columns: repeat(3, 1fr); }
    @media (max-width: 900px) {
      .chart-grid, .chart-grid.three { grid-template-columns: 1fr; }
    }
    .chart-card {
      background: #1c1c2e; border-radius: 14px; padding: 20px;
      border: 1px solid #2a2a40;
    }
    .chart-card h3 { font-size: 14px; font-weight: 600; color: #c4c4e0; margin-bottom: 16px; }
    .chart-card.full { grid-column: 1 / -1; }
    canvas { max-height: 280px; }

    /* 테이블 */
    .table-card { background: #1c1c2e; border-radius: 14px; padding: 20px; border: 1px solid #2a2a40; margin-bottom: 28px; }
    .table-card h3 { font-size: 14px; font-weight: 600; color: #c4c4e0; margin-bottom: 16px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 8px 12px; color: #9999bb; border-bottom: 1px solid #2a2a40; font-weight: 600; }
    td { padding: 9px 12px; border-bottom: 1px solid #1a1a2e; color: #d0d0e8; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #22223a; }
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600;
    }
    .badge-주거 { background: #3b2fa0; color: #a78bfa; }
    .badge-취업 { background: #1e3a5f; color: #60a5fa; }
    .badge-금융 { background: #1a3a2a; color: #34d399; }
    .badge-교육 { background: #3a2a10; color: #fbbf24; }
    .badge-복지 { background: #3a1a1a; color: #f87171; }
    .badge-unknown { background: #2a2a2a; color: #888; }

    /* 로딩/에러 */
    .loading { text-align: center; padding: 60px; color: #666688; font-size: 15px; }
    .error-banner { background: #3a1a1a; border: 1px solid #f87171; border-radius: 10px; padding: 16px 20px; margin-bottom: 20px; color: #f87171; font-size: 14px; }

    /* 새로고침 버튼 */
    #refresh-btn {
      background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2);
      color: #fff; padding: 8px 18px; border-radius: 20px; cursor: pointer; font-size: 13px;
      transition: background 0.2s;
    }
    #refresh-btn:hover { background: rgba(255,255,255,0.25); }
  </style>
</head>
<body>

<header>
  <div>
    <h1>⚡ SPARKY 대시보드</h1>
    <div id="last-updated">불러오는 중...</div>
  </div>
  <div style="display:flex; align-items:center; gap:16px;">
    <span class="meta">log-server: <code style="color:#a78bfa">localhost:8081</code></span>
    <button id="refresh-btn" onclick="loadAll()">↻ 새로고침</button>
  </div>
</header>

<div class="container">
  <div id="error-area"></div>

  <!-- KPI -->
  <div class="kpi-grid" id="kpi-grid">
    <div class="loading">데이터 불러오는 중...</div>
  </div>

  <!-- 일별 사용량 -->
  <div class="chart-card full" style="margin-bottom:20px;">
    <h3>📅 일별 사용량 (최근 30일)</h3>
    <canvas id="chart-daily"></canvas>
  </div>

  <!-- 도메인 + clarifying -->
  <div class="chart-grid">
    <div class="chart-card">
      <h3>🗂 도메인별 질문 분포</h3>
      <canvas id="chart-domain"></canvas>
    </div>
    <div class="chart-card">
      <h3>🔁 도메인별 AI 추가질문 비율</h3>
      <canvas id="chart-clarifying"></canvas>
    </div>
  </div>

  <!-- 사용자 프로필 -->
  <div style="display:grid; grid-template-columns:minmax(0,1fr) minmax(0,1fr) minmax(0,4fr); gap:20px; margin-top:20px;">
    <div class="chart-card">
      <h3>👤 연령대 분포</h3>
      <canvas id="chart-age" style="height:220px;"></canvas>
    </div>
    <div class="chart-card">
      <h3>⚧ 성별 분포</h3>
      <canvas id="chart-gender" style="height:220px;"></canvas>
    </div>
    <div class="chart-card">
      <h3>🗺 지역 분포</h3>
      <canvas id="chart-region" style="height:220px;"></canvas>
    </div>
  </div>

  <!-- 인기 정책 테이블 -->
  <div class="table-card" style="margin-top:20px;">
    <h3>🏆 인기 정책 TOP 10 (클릭 기준, 최근 30일)</h3>
    <div id="table-policies"><div class="loading">불러오는 중...</div></div>
  </div>
</div>

<script>
const API = 'http://localhost:8081/api/stats';
const PALETTE = ['#a78bfa','#60a5fa','#34d399','#fbbf24','#f87171','#f472b6','#38bdf8','#4ade80'];
const DOMAIN_LABELS = { 주거:'주거', 취업:'취업', 금융:'금융', 교육:'교육', 복지:'복지', unknown:'미분류' };
const AGE_LABELS    = { youth_19_24:'19-24세', youth_25_29:'25-29세', youth_30_34:'30-34세', youth_35_up:'35세+', unknown:'미분류' };
const GENDER_LABELS = { male:'남성', female:'여성', unknown:'미분류' };
const REGION_LABELS = {
  seoul:'서울', busan:'부산', daegu:'대구', incheon:'인천', gwangju:'광주', daejeon:'대전',
  ulsan:'울산', sejong:'세종', gyeonggi:'경기', gangwon:'강원', chungbuk:'충북', chungnam:'충남',
  jeonbuk:'전북', jeonnam:'전남', gyeongbuk:'경북', gyeongnam:'경남', jeju:'제주', central:'전국', unknown:'미분류'
};

const charts = {};

function destroyChart(id) {
  if (charts[id]) { charts[id].destroy(); delete charts[id]; }
}

function showError(msg) {
  document.getElementById('error-area').innerHTML =
    `<div class="error-banner">⚠️ ${msg}<br><small>log-server(8081)가 실행 중인지 확인하세요.</small></div>`;
}

async function fetchJSON(path) {
  const res = await fetch(API + path);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function loadOverview() {
  const d = await fetchJSON('/overview');
  document.getElementById('kpi-grid').innerHTML = `
    <div class="kpi-card"><div class="label">세션 수 (7일)</div><div class="value">${d.sessions}</div><div class="sub">고유 사용자 세션</div></div>
    <div class="kpi-card"><div class="label">총 질문 수 (7일)</div><div class="value">${d.questions}</div><div class="sub">전체 대화 턴</div></div>
    <div class="kpi-card"><div class="label">평균 응답시간</div><div class="value">${(d.avgResponseMs/1000).toFixed(1)}s</div><div class="sub">${d.avgResponseMs}ms</div></div>
    <div class="kpi-card"><div class="label">마스킹 감지 (7일)</div><div class="value">${d.maskingHits}</div><div class="sub">개인정보 검출</div></div>
    <div class="kpi-card"><div class="label">재질문 비율 (7일)</div><div class="value">${d.clarifyingPct}%</div><div class="sub">정책 부족 → 재질문</div></div>
  `;
}

async function loadDaily() {
  const rows = await fetchJSON('/daily');
  const labels   = rows.map(r => r.date).reverse();
  const sessions = rows.map(r => r.sessions).reverse();
  const questions= rows.map(r => r.questions).reverse();
  destroyChart('daily');
  charts['daily'] = new Chart(document.getElementById('chart-daily'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: '질문 수', data: questions, borderColor: '#a78bfa', backgroundColor: 'rgba(167,139,250,0.1)', tension: 0.3, fill: true, pointRadius: 3 },
        { label: '세션 수', data: sessions,  borderColor: '#60a5fa', backgroundColor: 'rgba(96,165,250,0.1)',  tension: 0.3, fill: true, pointRadius: 3, yAxisID: 'y2' },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: true,
      plugins: { legend: { labels: { color: '#c4c4e0' } } },
      scales: {
        x:  { ticks: { color: '#9999bb', maxTicksLimit: 10 }, grid: { color: '#1e1e30' } },
        y:  { ticks: { color: '#9999bb' }, grid: { color: '#1e1e30' }, title: { display: true, text: '질문', color: '#9999bb' } },
        y2: { position: 'right', ticks: { color: '#60a5fa' }, grid: { drawOnChartArea: false }, title: { display: true, text: '세션', color: '#60a5fa' } },
      }
    }
  });
}

async function loadDomain() {
  const rows = await fetchJSON('/domain');
  const labels = rows.map(r => DOMAIN_LABELS[r.domain] || r.domain);
  const counts = rows.map(r => r.count);

  function visibleTotal(chart) {
    const meta = chart.getDatasetMeta(0);
    return chart.data.datasets[0].data.reduce((sum, val, i) =>
      (meta.data[i] && meta.data[i].hidden) ? sum : sum + val, 0);
  }

  function calcPct(chart, value, index) {
    const meta = chart.getDatasetMeta(0);
    if (meta.data[index] && meta.data[index].hidden) return 0;
    const total = visibleTotal(chart);
    return total > 0 ? Math.round((value / total) * 100) : 0;
  }

  destroyChart('domain');
  charts['domain'] = new Chart(document.getElementById('chart-domain'), {
    type: 'doughnut',
    data: { labels, datasets: [{ data: counts, backgroundColor: PALETTE, borderWidth: 0 }] },
    options: {
      responsive: true, maintainAspectRatio: true,
      plugins: {
        legend: { position: 'right', labels: { color: '#c4c4e0', padding: 12, font: { size: 12 } } },
        tooltip: {
          callbacks: {
            label: ctx => {
              const pct = calcPct(ctx.chart, ctx.raw, ctx.dataIndex);
              return ` ${ctx.label}: ${ctx.raw}건 (${pct}%)`;
            }
          }
        },
        datalabels: {
          color: '#fff',
          font: { size: 11, weight: 'bold' },
          formatter: (value, ctx) => {
            const pct = calcPct(ctx.chart, value, ctx.dataIndex);
            return pct >= 3 ? `${value}건\n${pct}%` : '';
          }
        }
      }
    },
    plugins: [ChartDataLabels]
  });
}

async function loadClarifying() {
  const rows = await fetchJSON('/clarifying');
  const labels = rows.map(r => DOMAIN_LABELS[r.domain] || r.domain);
  const pcts   = rows.map(r => r.pct);
  destroyChart('clarifying');
  charts['clarifying'] = new Chart(document.getElementById('chart-clarifying'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{ label: '재질문 비율 (%)', data: pcts, backgroundColor: PALETTE, borderRadius: 6 }]
    },
    options: {
      responsive: true, maintainAspectRatio: true, indexAxis: 'y',
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#9999bb', callback: v => v + '%' }, grid: { color: '#1e1e30' }, max: 100 },
        y: { ticks: { color: '#c4c4e0' }, grid: { color: '#1e1e30' } }
      }
    }
  });
}

async function loadProfile() {
  const d = await fetchJSON('/profile');

  const makeBar = (id, rawRows, labelMap) => {
    const rows   = rawRows.map(r => ({ ...r, label: labelMap[r.label] || r.label }));
    const labels = rows.map(r => r.label);
    const counts = rows.map(r => r.count);
    destroyChart(id);
    charts[id] = new Chart(document.getElementById('chart-' + id), {
      type: 'bar',
      data: { labels, datasets: [{ data: counts, backgroundColor: PALETTE, borderRadius: 6 }] },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false },
          tooltip: { callbacks: { label: ctx => ` ${ctx.raw}세션 (${rows[ctx.dataIndex].pct}%)` } }
        },
        scales: {
          x: { ticks: { color: '#c4c4e0', font: { size: 11 } }, grid: { color: '#1e1e30' } },
          y: { ticks: { color: '#9999bb' }, grid: { color: '#1e1e30' } }
        }
      }
    });
  };

  makeBar('age',    d.age,    AGE_LABELS);
  makeBar('gender', d.gender, GENDER_LABELS);
  makeBar('region', d.region, REGION_LABELS);
}

async function loadTopPolicies() {
  const rows = await fetchJSON('/top-policies');
  if (!rows.length) {
    document.getElementById('table-policies').innerHTML = '<p style="color:#666;padding:16px">클릭 데이터가 없습니다.</p>';
    return;
  }
  const html = `
    <table>
      <thead><tr><th>#</th><th>정책명</th><th>분야</th><th>클릭 수</th><th>비율</th></tr></thead>
      <tbody>
        ${rows.map((r, i) => `
          <tr>
            <td style="color:#666">${i + 1}</td>
            <td>${r.title || r.policyId}</td>
            <td><span class="badge badge-${r.category || 'unknown'}">${r.category || '-'}</span></td>
            <td>${r.clicks}</td>
            <td>
              <div style="display:flex;align-items:center;gap:8px;">
                <div style="background:#2a2a40;border-radius:4px;height:6px;width:80px;overflow:hidden;">
                  <div style="background:#a78bfa;height:100%;width:${r.pct}%"></div>
                </div>
                <span style="color:#9999bb;font-size:12px">${r.pct}%</span>
              </div>
            </td>
          </tr>`).join('')}
      </tbody>
    </table>`;
  document.getElementById('table-policies').innerHTML = html;
}

async function loadAll() {
  document.getElementById('error-area').innerHTML = '';
  try {
    await Promise.all([
      loadOverview(),
      loadDaily(),
      loadDomain(),
      loadClarifying(),
      loadProfile(),
      loadTopPolicies(),
    ]);
    document.getElementById('last-updated').textContent =
      '마지막 갱신: ' + new Date().toLocaleString('ko-KR');
  } catch (e) {
    showError('데이터를 불러오지 못했습니다. (' + e.message + ')');
    document.getElementById('kpi-grid').innerHTML = '';
  }
}

loadAll();
setInterval(loadAll, 60000); // 1분마다 자동 갱신
</script>
</body>
</html>
