version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sparky-ai-postgres
    environment:
      POSTGRES_DB: sparky
      POSTGRES_USER: sparky
      POSTGRES_PASSWORD: sparky1234
    ports:
      - "5433:5432"
    volumes:
      - sparky_ai_pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sparky -d sparky"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sparky_ai_pgdata:
